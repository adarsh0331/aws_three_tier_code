apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bookstore

resources:
  - namespace.yaml
  - configmaps/backend-config.yaml
  - secrets/external-secret.yaml
  - database/mysql-init-configmap.yaml
  - database/mysql-service.yaml
  - database/mysql-statefulset.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/hpa.yaml
  - ingress/ingress.yaml
  - network-policy/network-policy.yaml
  - pdb/pdb.yaml

# The CI pipeline updates these entries via:
#   kustomize edit set image bookstore-backend=<registry>/bookstore-backend:<tag>
#   kustomize edit set image bookstore-frontend=<registry>/bookstore-frontend:<tag>
# ArgoCD detects the resulting commit and syncs the cluster automatically.
# Replace ACCOUNT_ID below after running scripts/bootstrap-tf-state.sh (same account).
images:
  - name: bookstore-backend
    newName: ACCOUNT_ID.dkr.ecr.us-west-1.amazonaws.com/bookstore-backend
    newTag: latest
  - name: bookstore-frontend
    newName: ACCOUNT_ID.dkr.ecr.us-west-1.amazonaws.com/bookstore-frontend
    newTag: latest
