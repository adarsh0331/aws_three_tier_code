# ─────────────────────────────────────────────────────────────────────────────
# External Secrets Operator — DB Credentials
#
# Prerequisites:
#   1. External Secrets Operator installed in the cluster:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#
#   2. A service account with IRSA (IAM Roles for Service Accounts) that has
#      secretsmanager:GetSecretValue on the path below:
#        arn:aws:secretsmanager:<region>:<account>:secret:/bookstore/db-credentials-*
#
#   3. The secret stored in AWS Secrets Manager at:
#        /bookstore/db-credentials
#      with JSON body:
#        { "DB_USERNAME": "admin", "DB_PASSWORD": "<strong-password>" }
#
# The ESO controller reconciles every hour and rotates the k8s Secret
# automatically when the value changes in Secrets Manager.
# No credentials are stored in git or passed through the pipeline.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-1
      auth:
        jwt:
          serviceAccountRef:
            name:      external-secrets-sa
            namespace: external-secrets

---

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: bookstore
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name:           db-secret
    creationPolicy: Owner

  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key:      /bookstore/db-credentials
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key:      /bookstore/db-credentials
        property: DB_PASSWORD
