name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All secrets are stored in GitHub Secrets — never hardcoded here.
# Required secrets:
#   AWS_ACCOUNT_ID  — used only to construct the ECR registry URL
#   AWS_ROLE_ARN    — OIDC role; no static AWS keys anywhere
#   API_URL         — backend API URL injected at frontend build time
#   SEMGREP_APP_TOKEN (optional) — needed only if Semgrep Cloud is used

env:
  AWS_REGION:    us-west-1
  ECR_REGISTRY:  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-1.amazonaws.com
  BACKEND_REPO:  bookstore-backend
  FRONTEND_REPO: bookstore-frontend
  EKS_CLUSTER:   bookstore-eks
  K8S_NAMESPACE: bookstore

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 0 · Secret Detection
  # Fail immediately if any secret, key, or token is found in the commit.
  # Runs on every push and PR before any other job.
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "🔐 Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets across git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 1 · SAST + Dependency Audit
  # Static analysis and known-vulnerability checks on source code.
  # ─────────────────────────────────────────────────────────────────────────
  sast:
    name: "🛡️ SAST & Dependency Audit"
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd client && npm ci

      - name: npm audit — backend (fail on high/critical CVEs)
        run: cd backend && npm audit --audit-level=high

      - name: npm audit — frontend (fail on critical CVEs; react-scripts build tooling has unfixable highs)
        run: cd client && npm audit --audit-level=critical

      - name: Semgrep SAST (Node.js + OWASP Top-10 rules)
        run: |
          python -m pip install semgrep --quiet
          semgrep scan \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2 · Lint & Manifest Validation
  # Linting must pass; k8s manifests must be structurally valid.
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: "✅ Lint & Validate"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: cd client && npm ci

      - name: ESLint — frontend (zero warnings allowed)
        run: cd client && npx eslint src --max-warnings=0

      - name: Validate Kubernetes manifests (kubeconform)
        run: |
          curl -sLo kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
          find k8s -name "*.yaml" ! -name "kustomization.yaml" | \
            xargs kubeconform \
              -ignore-missing-schemas \
              -kubernetes-version 1.31.0 \
              -summary

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 3 · Build → Container Scan → Push
  # Images are built, scanned by Trivy, then pushed to ECR.
  # A CRITICAL or HIGH CVE fails the build — images are never pushed dirty.
  # Authentication uses OIDC; no AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "🐳 Build → Trivy Scan → Push"
    runs-on: ubuntu-latest
    needs: [sast, validate]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write        # required for OIDC token exchange
      contents: read
      security-events: write # required for SARIF upload to Security tab
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive image tag (first 8 chars of git SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC (no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────
      - name: Build backend image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context:   ./backend
          push:      false
          load:      true
          tags:      ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy — scan backend (CRITICAL + HIGH = hard fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.tag }}
          format:         sarif
          output:         trivy-backend.sarif
          severity:       CRITICAL,HIGH
          exit-code:      "1"
          ignore-unfixed: true

      - name: Show backend CVEs in CI log (diagnostic on failure)
        if: failure()
        run: |
          [ -f trivy-backend.sarif ] && \
            jq -r '.runs[].results[] |
              "[" + (.level | ascii_upcase) + "] " + .ruleId +
              ": " + (.message.text | split("\n")[0])' \
            trivy-backend.sarif \
          || echo "trivy-backend.sarif not found"

      - name: Upload backend Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy-backend

      - name: Push backend image + tag as latest
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.tag }}
          docker tag  ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.tag }} \
                      ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

      # ── Frontend image ───────────────────────────────────────────────────
      - name: Build frontend image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context:   ./client
          push:      false
          load:      true
          tags:      ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.tag }}
          build-args: REACT_APP_API_URL=${{ secrets.API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy — scan frontend (CRITICAL + HIGH = hard fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.tag }}
          format:         sarif
          output:         trivy-frontend.sarif
          severity:       CRITICAL,HIGH
          exit-code:      "1"
          ignore-unfixed: true

      - name: Show frontend CVEs in CI log (diagnostic on failure)
        if: failure()
        run: |
          [ -f trivy-frontend.sarif ] && \
            jq -r '.runs[].results[] |
              "[" + (.level | ascii_upcase) + "] " + .ruleId +
              ": " + (.message.text | split("\n")[0])' \
            trivy-frontend.sarif \
          || echo "trivy-frontend.sarif not found"

      - name: Upload frontend Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          sarif_file: trivy-frontend.sarif
          category:   trivy-frontend

      - name: Push frontend image + tag as latest
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.tag }}
          docker tag  ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.tag }} \
                      ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 4 · GitOps image-tag update
  #
  # Requires manual approval via the "production" environment gate.
  # Instead of running kubectl directly, this stage commits the new image tags
  # into k8s/kustomization.yaml. ArgoCD watches the repo and reconciles the
  # cluster automatically (poll interval: 3 min).
  #
  # The push uses GITHUB_TOKEN which never re-triggers a new pipeline run,
  # so there is no loop risk.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Update image tags (GitOps → ArgoCD)"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production     # ← requires a reviewer to approve in GitHub
    permissions:
      id-token: write
      contents: write           # needed to push the kustomization.yaml commit

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — pushes made with this token do NOT
          # trigger another workflow run, preventing an infinite loop.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Update image tags in kustomization.yaml
        env:
          TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          cd k8s
          kustomize edit set image \
            bookstore-backend=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${TAG}
          kustomize edit set image \
            bookstore-frontend=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${TAG}

      - name: Commit and push updated image tags
        env:
          TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          git config user.email "ci-bot@github-actions"
          git config user.name "GitHub Actions"
          git add k8s/kustomization.yaml
          # Skips the commit if kustomization.yaml did not actually change
          git diff --staged --quiet && echo "No image tag changes." && exit 0
          git commit -m "chore: bump image tags to ${TAG}"
          git push
